<!DOCTYPE html>
<html lang="pt-BR">
	<head>
		<title>layout</title>
		<meta charset="UTF-8" />
		<meta http-equiv="X-UA-Compatible" content="IE=edge" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link
			href="./img/favicon-16x16.ico"
			rel="shortcut icon"
			type="image/x-icon"
		/>
		<link rel="stylesheet" href="./css/reset.css" />
		<link rel="stylesheet" href="./css/style.css" />
	</head>

	<body>
		<div id="layout">
			<div class="block-nav">
				<nav class="nav container">
					<div class="nav-logo">
						<a href="./">
							<svg
								class="logo"
								viewBox="0 0 512 512"
								xmlns="http://www.w3.org/2000/svg"
							>
								<rect
									class="logo-rect"
									width="512"
									height="512"
									x="0"
									y="0"
									fill="currentColor"
								/>
							</svg>
						</a>
					</div>
					<div class="nav-links">
						<a class="links-button" href="#about">
							<div class="links-text">about</div>
						</a>
						<a class="links-button" href="#experience">
							<div class="links-text">experience</div>
						</a>
						<a class="links-button" href="#work">
							<div class="links-text">work</div>
						</a>
						<a class="links-button" href="#projects">
							<div class="links-text">projects</div>
						</a>
						<a class="links-button" href="#contact">
							<div class="links-text">contact</div>
						</a>
						<a class="links-button" href="resume.pdf">
							<div class="links-text">resume</div>
						</a>
					</div>
				</nav>
			</div>
			<div id="content">
				<div class="block-header">
					<header class="container" id="about">
						<div class="about-text">
							<h1 class="text-h1">Laurinha</h1>
							<h2 class="text-h2">do Camarão</h2>
							<h3 class="text-h3"></h3>
							<p class="text-p"></p>
						</div>
					</header>
				</div>
				<div class="block-main">
					<main>
						<div class="container" id="experience"></div>
						<div class="container" id="work"></div>
						<div class="container" id="projects"></div>
					</main>
				</div>
				<div class="block-footer">
					<footer class="container" id="contact"></footer>
				</div>
			</div>
		</div>
	</body>
</html>
